<!DOCTYPE html>
<html lang="vi" xmlns:th="http://www.thymeleaf.org">
    <link rel="manifest" href="/manifest.json">

    <meta name="theme-color" content="#efad24">

    <meta name="application-name" content="Review App">

    <meta
        name="apple-mobile-web-app-capable"
        content="yes"
    >

    <meta
        name="apple-mobile-web-app-status-bar-style"
        content="default"
    >

    <meta
        name="apple-mobile-web-app-title"
        content="Review App"
    >

    <link
        rel="apple-touch-icon"
        href="/images/icon-192.png"
>
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    >

    <title>Cảm ơn bạn</title>

    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: Arial, sans-serif;
            -webkit-tap-highlight-color: transparent;
        }

        html,
        body {
            width: 100%;
            min-height: 100%;
        }

        body {
            min-height: 100vh;
            min-height: 100dvh;

            display: flex;
            align-items: center;
            justify-content: center;

            padding: 24px;
            overflow: hidden;

            background:
                radial-gradient(
                    circle at 15% 15%,
                    rgba(255, 219, 141, 0.48),
                    transparent 34%
                ),
                radial-gradient(
                    circle at 85% 85%,
                    rgba(255, 237, 195, 0.82),
                    transparent 38%
                ),
                linear-gradient(
                    145deg,
                    #fffdf8 0%,
                    #fff8e9 50%,
                    #fffdf8 100%
                );

            color: #252525;
        }

        .background-decoration {
            position: fixed;
            inset: 0;
            overflow: hidden;
            pointer-events: none;
        }

        .circle {
            position: absolute;
            border-radius: 50%;
            border: 1px solid rgba(196, 137, 31, 0.13);
        }

        .circle-one {
            width: 320px;
            height: 320px;
            top: -150px;
            right: -90px;
        }

        .circle-two {
            width: 220px;
            height: 220px;
            bottom: -90px;
            left: -70px;
        }

        .sparkle {
            position: absolute;
            color: rgba(222, 158, 34, 0.55);
            animation: float 3.5s ease-in-out infinite;
        }

        .sparkle-one {
            top: 18%;
            left: 12%;
            font-size: 28px;
        }

        .sparkle-two {
            top: 25%;
            right: 13%;
            font-size: 20px;
            animation-delay: 0.8s;
        }

        .sparkle-three {
            bottom: 18%;
            right: 20%;
            font-size: 26px;
            animation-delay: 1.5s;
        }

        @keyframes float {
            0%,
            100% {
                transform: translateY(0) rotate(0deg);
                opacity: 0.45;
            }

            50% {
                transform: translateY(-12px) rotate(8deg);
                opacity: 1;
            }
        }

        .card {
            position: relative;
            z-index: 1;

            width: min(720px, 100%);
            padding: 62px 42px;

            border: 1px solid rgba(255, 255, 255, 0.95);
            border-radius: 38px;

            background: rgba(255, 255, 255, 0.91);

            box-shadow:
                0 28px 90px rgba(153, 104, 26, 0.15),
                inset 0 1px 0 rgba(255, 255, 255, 0.98);

            backdrop-filter: blur(24px);
            -webkit-backdrop-filter: blur(24px);

            text-align: center;
        }

        .branch-badge {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;

            min-height: 38px;
            padding: 9px 16px;
            margin-bottom: 28px;

            border: 1px solid rgba(179, 123, 24, 0.16);
            border-radius: 999px;

            background: #fff8e7;
            color: #946515;

            font-size: 13px;
            font-weight: 700;
        }

        .branch-dot {
            width: 8px;
            height: 8px;

            border-radius: 50%;

            background: #efad24;
            box-shadow: 0 0 0 5px rgba(239, 173, 36, 0.13);
        }

        .icon-wrapper {
            position: relative;

            width: 126px;
            height: 126px;

            display: grid;
            place-items: center;

            margin: 0 auto 30px;
        }

        .icon-ring {
            position: absolute;
            inset: 0;

            border: 2px solid rgba(231, 169, 41, 0.22);
            border-radius: 50%;

            animation: pulse 2s ease-out infinite;
        }

        .icon-ring-second {
            animation-delay: 0.8s;
        }

        @keyframes pulse {
            0% {
                transform: scale(0.82);
                opacity: 0.8;
            }

            100% {
                transform: scale(1.35);
                opacity: 0;
            }
        }

        .icon {
            position: relative;
            z-index: 2;

            width: 106px;
            height: 106px;

            display: grid;
            place-items: center;

            border-radius: 50%;

            background:
                linear-gradient(
                    145deg,
                    #fff6d5,
                    #ffe9a5
                );

            color: #9c6a0c;

            font-size: 52px;
            font-weight: 700;

            box-shadow:
                0 16px 32px rgba(214, 151, 29, 0.18),
                inset 0 1px 0 rgba(255, 255, 255, 0.95);

            animation: iconAppear 0.6s ease both;
        }

        @keyframes iconAppear {
            from {
                transform: scale(0.6) rotate(-12deg);
                opacity: 0;
            }

            to {
                transform: scale(1) rotate(0);
                opacity: 1;
            }
        }

        .eyebrow {
            margin-bottom: 13px;

            color: #b37b18;

            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2.4px;
            text-transform: uppercase;
        }

        h1 {
            margin-bottom: 18px;

            color: #202020;

            font-size: clamp(42px, 7vw, 68px);
            font-weight: 800;
            line-height: 1.05;
            letter-spacing: -2px;
        }

        .message {
            max-width: 520px;
            margin: 0 auto;

            color: #737373;

            font-size: 18px;
            line-height: 1.7;
        }

        .countdown-box {
            max-width: 420px;

            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;

            margin: 30px auto 0;
            padding: 15px 18px;

            border: 1px solid #f0e3ca;
            border-radius: 18px;

            background: #fffaf0;
            color: #956716;

            font-size: 15px;
            font-weight: 700;
        }

        .seconds {
            min-width: 34px;
            height: 34px;

            display: inline-grid;
            place-items: center;

            border-radius: 50%;

            background: #f1b63a;
            color: #ffffff;

            font-size: 16px;
            font-weight: 800;

            box-shadow: 0 8px 18px rgba(209, 144, 19, 0.22);
        }

        .reset-button {
            width: 100%;
            max-width: 420px;
            min-height: 56px;

            margin-top: 18px;

            border: 0;
            border-radius: 18px;

            background: #202020;
            color: #ffffff;

            font-size: 16px;
            font-weight: 700;

            cursor: pointer;

            transition:
                transform 0.18s ease,
                background 0.18s ease,
                box-shadow 0.18s ease;
        }

        .reset-button:hover {
            background: #000000;
            transform: translateY(-2px);
            box-shadow: 0 14px 30px rgba(0, 0, 0, 0.14);
        }

        .reset-button:active {
            transform: scale(0.98);
        }

        @media (max-width: 620px) {
            body {
                padding: 16px;
            }

            .card {
                padding: 46px 22px;
                border-radius: 29px;
            }

            h1 {
                letter-spacing: -1.3px;
            }

            .message {
                font-size: 16px;
            }

            .countdown-box {
                flex-wrap: wrap;
                line-height: 1.5;
            }
        }

        @media (max-height: 640px) {
            body {
                overflow-y: auto;
                align-items: flex-start;
            }

            .card {
                margin: 14px 0;
                padding-top: 36px;
                padding-bottom: 36px;
            }

            .icon-wrapper {
                width: 105px;
                height: 105px;
                margin-bottom: 20px;
            }

            .icon {
                width: 88px;
                height: 88px;
                font-size: 43px;
            }

            .branch-badge {
                margin-bottom: 20px;
            }
        }
    </style>
</head>

<body>

<div class="background-decoration">
    <div class="circle circle-one"></div>
    <div class="circle circle-two"></div>

    <span class="sparkle sparkle-one">✦</span>
    <span class="sparkle sparkle-two">✧</span>
    <span class="sparkle sparkle-three">✦</span>
</div>

<main class="card">

    <div
        class="branch-badge"
        th:if="${branchName != null}"
    >
        <span class="branch-dot"></span>

        <span th:text="${branchName}">
            Tên chi nhánh
        </span>
    </div>

    <div class="icon-wrapper">
        <div class="icon-ring"></div>
        <div class="icon-ring icon-ring-second"></div>

        <div class="icon">✓</div>
    </div>

    <div class="eyebrow">
        Review Completed
    </div>

    <h1>Cảm ơn bạn!</h1>

    <p class="message">
        Đánh giá của bạn đã được ghi nhận.<br>
        Những chia sẻ này sẽ giúp cửa hàng phục vụ bạn tốt hơn.
    </p>

    <div class="countdown-box">
        <span>Màn hình sẽ tự đặt lại sau</span>

        <span
            class="seconds"
            id="seconds"
        >
            5
        </span>

        <span>giây</span>
    </div>

    <button
        class="reset-button"
        id="resetButton"
        type="button"
    >
        Đánh giá tiếp theo
    </button>

</main>

<script th:inline="javascript">
    const branchCode = /*[[${branchCode}]]*/ "";
    const secondsElement = document.getElementById("seconds");
    const resetButton = document.getElementById("resetButton");

    let seconds = 5;
    let redirected = false;

    function returnToReviewPage() {
        if (redirected) {
            return;
        }

        redirected = true;

        if (branchCode && branchCode.trim() !== "") {
            window.location.replace(
                "/review/" + encodeURIComponent(branchCode)
            );
        } else {
            window.location.replace("/");
        }
    }

    const timer = window.setInterval(() => {
        seconds -= 1;
        secondsElement.textContent = seconds;

        if (seconds <= 0) {
            window.clearInterval(timer);
            returnToReviewPage();
        }
    }, 1000);

    resetButton.addEventListener("click", () => {
        window.clearInterval(timer);
        returnToReviewPage();
    });
</script>
<script>
    if ("serviceWorker" in navigator) {
        window.addEventListener("load", function () {
            navigator.serviceWorker
                .register("/service-worker.js")
                .then(function (registration) {
                    console.log(
                        "Service Worker đã đăng ký:",
                        registration.scope
                    );
                })
                .catch(function (error) {
                    console.error(
                        "Không thể đăng ký Service Worker:",
                        error
                    );
                });
        });
    }
</script>
</body>
</html>
