<!DOCTYPE html>
<html lang="vi"
      xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Đăng nhập</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #f4f6f8;
        }

        .login-box {
            width: min(400px, calc(100% - 32px));
            padding: 32px;
            background: white;
            border-radius: 18px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.10);
        }

        h1 {
            margin: 0 0 8px;
            font-size: 27px;
        }

        .subtitle {
            margin: 0 0 24px;
            color: #6b7280;
        }

        label {
            display: block;
            margin-bottom: 7px;
            font-size: 14px;
            font-weight: 600;
        }

        input {
            width: 100%;
            height: 48px;
            margin-bottom: 18px;
            padding: 0 14px;
            border: 1px solid #d9dee5;
            border-radius: 11px;
            outline: none;
            font-size: 15px;
        }

        input:focus {
            border-color: #111827;
        }

        button {
            width: 100%;
            height: 48px;
            border: 0;
            border-radius: 11px;
            background: #111827;
            color: white;
            font-size: 15px;
            font-weight: 700;
            cursor: pointer;
        }

        button:hover {
            opacity: 0.9;
        }

        .alert {
            margin-bottom: 18px;
            padding: 12px;
            border-radius: 10px;
            font-size: 14px;
        }

        .error {
            color: #b42318;
            background: #fee4e2;
        }

        .success {
            color: #067647;
            background: #dcfae6;
        }
    </style>
</head>

<body>

<div class="login-box">

    <h1>Đăng nhập</h1>
    <p class="subtitle">
        Đăng nhập vào hệ thống quản lý đánh giá
    </p>

    <div th:if="${param.error}"
         class="alert error">
        Sai tên đăng nhập, mật khẩu hoặc tài khoản đã bị khóa.
    </div>

    <div th:if="${param.logout}"
         class="alert success">
        Bạn đã đăng xuất thành công.
    </div>

    <form th:action="@{/login}" method="post">

        <label for="username">
            Tên đăng nhập
        </label>

        <input
                id="username"
                name="username"
                type="text"
                placeholder="Nhập tên đăng nhập"
                autocomplete="username"
                required>

        <label for="password">
            Mật khẩu
        </label>

        <input
                id="password"
                name="password"
                type="password"
                placeholder="Nhập mật khẩu"
                autocomplete="current-password"
                required>

        <button type="submit">
            Đăng nhập
        </button>

    </form>

</div>

</body>
</html>
